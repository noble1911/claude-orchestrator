name: Release Artifacts

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  desktop_release:
    name: Build Desktop Release Artifacts
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app + dmg
        run: npm run build-dmg

      - name: Prepare desktop release files
        run: |
          TAG="${{ github.event.release.tag_name }}"
          mkdir -p release-assets
          ditto -c -k --sequesterRsrc --keepParent "builds/Claude Orchestrator.app" "release-assets/Claude-Orchestrator-${TAG}-macos-app.zip"
          cp "builds/Claude Orchestrator.dmg" "release-assets/Claude-Orchestrator-${TAG}-macos.dmg"

      - name: Upload desktop assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/Claude-Orchestrator-${{ github.event.release.tag_name }}-macos-app.zip
            release-assets/Claude-Orchestrator-${{ github.event.release.tag_name }}-macos.dmg

  mobile_release:
    name: Build Mobile Release Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm ci --prefix mobile

      - name: Export mobile bundle
        env:
          EXPO_NO_TELEMETRY: "1"
        run: |
          TAG="${{ github.event.release.tag_name }}"
          cd mobile
          npx expo export --platform ios --output-dir dist-export/ios
          npx expo export --platform android --output-dir dist-export/android
          tar -czf "../Claude-Orchestrator-${TAG}-mobile-export.tar.gz" dist-export

      - name: Upload mobile asset to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Claude-Orchestrator-${{ github.event.release.tag_name }}-mobile-export.tar.gz
