name: Release Artifacts

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to build/upload (for example v0.0.3)
        required: true
        type: string

permissions:
  contents: write

jobs:
  desktop_release:
    name: Build Desktop Release Artifacts
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.event.release.tag_name }}
      PUBLIC_RELEASE_REPOSITORY: noble1911/claude-orchestrator-releases
      PUBLIC_RELEASES_TOKEN: ${{ secrets.PUBLIC_RELEASES_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref }}

      - name: Resolve release metadata
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_PUBLISHED_AT_EVENT: ${{ github.event.release.published_at }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "release" ]; then
            PUBLISHED_AT="${RELEASE_PUBLISHED_AT_EVENT}"
          else
            PUBLISHED_AT="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json publishedAt --jq '.publishedAt')"
          fi

          if [ -z "${PUBLISHED_AT:-}" ] || [ "$PUBLISHED_AT" = "null" ]; then
            echo "::error::Unable to determine publishedAt for release tag '$RELEASE_TAG'."
            exit 1
          fi

          echo "RELEASE_PUBLISHED_AT=$PUBLISHED_AT" >> "$GITHUB_ENV"

      - name: Require public release mirror token
        run: |
          if [ -z "${PUBLIC_RELEASES_TOKEN:-}" ]; then
            echo "::error::PUBLIC_RELEASES_TOKEN secret is required to publish public release artifacts."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Resolve updater signing secrets (optional)
        id: signing
        env:
          RAW_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${RAW_TAURI_SIGNING_PRIVATE_KEY:-}" ] || [ -z "${RAW_TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Updater signing secrets are missing. Building desktop artifacts without updater bundles."
            exit 0
          fi

          KEY="$RAW_TAURI_SIGNING_PRIVATE_KEY"
          KEY="${KEY//$'\r'/}"

          # Support secret values pasted with literal '\n' sequences.
          if [[ "$KEY" == *"\\n"* ]]; then
            KEY="$(printf '%b' "$KEY")"
          fi

          # Tauri expects TAURI_SIGNING_PRIVATE_KEY as base64-encoded minisign key text.
          # Accept either raw key text, payload-only, or already-base64-encoded key text.
          if ! printf '%s' "$KEY" | grep -q '^untrusted comment:'; then
            DECODED=""
            if DECODED="$(printf '%s' "$KEY" | base64 --decode 2>/dev/null)"; then
              :
            elif DECODED="$(printf '%s' "$KEY" | base64 -D 2>/dev/null)"; then
              :
            fi
            if printf '%s' "$DECODED" | grep -q '^untrusted comment:'; then
              KEY="$DECODED"
            fi
          fi

          # Support secret values stored as only the minisign payload line.
          if ! printf '%s' "$KEY" | grep -q '^untrusted comment:'; then
            if printf '%s' "$KEY" | grep -Eq '^RW[0-9A-Za-z+/=]+$'; then
              KEY=$'untrusted comment: minisign encrypted secret key\n'"$KEY"
            fi
          fi

          if ! printf '%s' "$KEY" | grep -q '^untrusted comment:'; then
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY format is invalid. Building desktop artifacts without updater bundles."
            exit 0
          fi

          if ! printf '%s\n' "$KEY" | grep -q -E '^RW[0-9A-Za-z+/=]+$'; then
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY payload is missing. Building desktop artifacts without updater bundles."
            exit 0
          fi

          KEY_B64="$(printf '%s' "$KEY" | base64 | tr -d '\n')"

          # Avoid exposing transformed secrets in logs.
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done <<< "$KEY"
          echo "::add-mask::$KEY_B64"

          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<EOF"
            printf '%s\n' "$KEY_B64"
            echo "EOF"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<EOF"
            printf '%s\n' "$RAW_TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
            echo "EOF"
          } >> "$GITHUB_ENV"

          echo "has_signing=true" >> "$GITHUB_OUTPUT"

      - name: Build desktop app (+ updater when signing is enabled)
        id: desktop_build
        env:
          HAS_SIGNING: ${{ steps.signing.outputs.has_signing }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npm run build
          if [ "$HAS_SIGNING" = "true" ]; then
            npx tauri build --bundles app --config '{"bundle":{"createUpdaterArtifacts":true}}'
            echo "effective_has_signing=true" >> "$GITHUB_OUTPUT"
          else
            npx tauri build --bundles app
            echo "effective_has_signing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare desktop release files
        env:
          HAS_SIGNING: ${{ steps.desktop_build.outputs.effective_has_signing }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          APP_SOURCE="src-tauri/target/release/bundle/macos/Claude Orchestrator.app"
          mkdir -p builds
          rm -rf "builds/Claude Orchestrator.app"
          ditto "$APP_SOURCE" "builds/Claude Orchestrator.app"

          # If signature verification fails after staging, re-sign ad-hoc so macOS does not flag it as broken.
          if ! codesign --verify --deep --strict --verbose=2 "builds/Claude Orchestrator.app"; then
            codesign --force --deep --sign - "builds/Claude Orchestrator.app"
          fi

          # Create installer-friendly DMG contents: app + Applications shortcut.
          rm -rf "builds/dmg-root"
          mkdir -p "builds/dmg-root"
          ditto "builds/Claude Orchestrator.app" "builds/dmg-root/Claude Orchestrator.app"
          ln -sfn /Applications "builds/dmg-root/Applications"
          rm -f "builds/Claude Orchestrator.dmg"
          hdiutil create -volname "Claude Orchestrator" -srcfolder "builds/dmg-root" -ov -format UDZO "builds/Claude Orchestrator.dmg"
          mkdir -p release-assets
          ditto -c -k --sequesterRsrc --keepParent "builds/Claude Orchestrator.app" "release-assets/Claude-Orchestrator-${TAG}-macos-app.zip"
          cp "builds/Claude Orchestrator.dmg" "release-assets/Claude-Orchestrator-${TAG}-macos.dmg"
          if [ "$HAS_SIGNING" = "true" ]; then
            UPDATER_SOURCE="$(find src-tauri/target/release/bundle -type f -name '*.app.tar.gz' | head -n 1)"
            UPDATER_SIG_SOURCE="$(find src-tauri/target/release/bundle -type f -name '*.app.tar.gz.sig' | head -n 1)"
            if [ -z "$UPDATER_SOURCE" ] || [ -z "$UPDATER_SIG_SOURCE" ]; then
              echo "::warning::Updater bundles were expected but not found. Uploading desktop app/dmg only."
              exit 0
            fi

            UPDATER_FILE="Claude-Orchestrator-${TAG}-macos-updater.tar.gz"
            UPDATER_SIG_FILE="${UPDATER_FILE}.sig"
            cp "$UPDATER_SOURCE" "release-assets/$UPDATER_FILE"
            cp "$UPDATER_SIG_SOURCE" "release-assets/$UPDATER_SIG_FILE"

            ARCH="$(uname -m)"
            if [ "$ARCH" = "arm64" ]; then
              TARGET_ARCH="aarch64"
            else
              TARGET_ARCH="x86_64"
            fi
            TARGET_BASE="darwin-${TARGET_ARCH}"
            RELEASE_URL_BASE="https://github.com/${{ env.PUBLIC_RELEASE_REPOSITORY }}/releases/download/${TAG}"
            UPDATER_SIG_CONTENT="$(cat "release-assets/$UPDATER_SIG_FILE")"
            UPDATER_DOWNLOAD_URL="${RELEASE_URL_BASE}/${UPDATER_FILE}"
            UPDATE_TARGET="${TARGET_BASE}"
            UPDATE_VERSION="${TAG#v}"
            UPDATE_PUB_DATE="${{ env.RELEASE_PUBLISHED_AT }}"
            jq -n \
              --arg version "$UPDATE_VERSION" \
              --arg notes "Release $UPDATE_VERSION" \
              --arg pub_date "$UPDATE_PUB_DATE" \
              --arg target "$UPDATE_TARGET" \
              --arg url "$UPDATER_DOWNLOAD_URL" \
              --arg signature "$UPDATER_SIG_CONTENT" \
              '{
                version: $version,
                notes: $notes,
                pub_date: $pub_date,
                platforms: {
                  ($target): { url: $url, signature: $signature },
                  (($target + "-app")): { url: $url, signature: $signature }
                }
              }' > release-assets/latest.json
          else
            echo "Updater signing disabled; skipping updater tar/signature/latest.json generation."
          fi

      - name: Upload desktop assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          fail_on_unmatched_files: false
          files: |
            release-assets/Claude-Orchestrator-${{ env.RELEASE_TAG }}-macos-app.zip
            release-assets/Claude-Orchestrator-${{ env.RELEASE_TAG }}-macos.dmg
            release-assets/Claude-Orchestrator-${{ env.RELEASE_TAG }}-macos-updater.tar.gz
            release-assets/Claude-Orchestrator-${{ env.RELEASE_TAG }}-macos-updater.tar.gz.sig
            release-assets/latest.json

      - name: Upload desktop assets to public release mirror
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.PUBLIC_RELEASE_REPOSITORY }}
          tag_name: ${{ env.RELEASE_TAG }}
          fail_on_unmatched_files: false
          files: |
            release-assets/Claude-Orchestrator-${{ env.RELEASE_TAG }}-macos-app.zip
            release-assets/Claude-Orchestrator-${{ env.RELEASE_TAG }}-macos.dmg
            release-assets/Claude-Orchestrator-${{ env.RELEASE_TAG }}-macos-updater.tar.gz
            release-assets/Claude-Orchestrator-${{ env.RELEASE_TAG }}-macos-updater.tar.gz.sig
            release-assets/latest.json
        env:
          GITHUB_TOKEN: ${{ env.PUBLIC_RELEASES_TOKEN }}

  mobile_release:
    name: Build Mobile Release Artifact (Android APK)
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.event.release.tag_name }}
      PUBLIC_RELEASE_REPOSITORY: noble1911/claude-orchestrator-releases
      PUBLIC_RELEASES_TOKEN: ${{ secrets.PUBLIC_RELEASES_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref }}

      - name: Require public release mirror token
        run: |
          if [ -z "${PUBLIC_RELEASES_TOKEN:-}" ]; then
            echo "::error::PUBLIC_RELEASES_TOKEN secret is required to publish public release artifacts."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install mobile dependencies
        run: npm ci --prefix mobile

      - name: Build Android APK
        env:
          EXPO_NO_TELEMETRY: "1"
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          cd mobile
          npx expo prebuild --platform android --non-interactive --clean
          cd android
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleRelease

          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "::error::Expected APK not found at $APK_PATH"
            exit 1
          fi
          cp "$APK_PATH" "../../Claude-Orchestrator-${TAG}-android.apk"

      - name: Upload mobile asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            Claude-Orchestrator-${{ env.RELEASE_TAG }}-android.apk

      - name: Upload mobile asset to public release mirror
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.PUBLIC_RELEASE_REPOSITORY }}
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            Claude-Orchestrator-${{ env.RELEASE_TAG }}-android.apk
        env:
          GITHUB_TOKEN: ${{ env.PUBLIC_RELEASES_TOKEN }}
