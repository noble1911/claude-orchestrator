name: Release Artifacts

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to build/upload (for example v0.0.3)
        required: true
        type: string

permissions:
  contents: write

jobs:
  desktop_release:
    name: Build Desktop Release Artifacts
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.event.release.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref }}

      - name: Resolve release metadata
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_PUBLISHED_AT_EVENT: ${{ github.event.release.published_at }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "release" ]; then
            PUBLISHED_AT="${RELEASE_PUBLISHED_AT_EVENT}"
          else
            PUBLISHED_AT="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json publishedAt --jq '.publishedAt')"
          fi

          if [ -z "${PUBLISHED_AT:-}" ] || [ "$PUBLISHED_AT" = "null" ]; then
            echo "::error::Unable to determine publishedAt for release tag '$RELEASE_TAG'."
            exit 1
          fi

          echo "RELEASE_PUBLISHED_AT=$PUBLISHED_AT" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Normalize updater signing secrets
        env:
          RAW_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${RAW_TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY secret."
            exit 1
          fi

          if [ -z "${RAW_TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY_PASSWORD secret."
            exit 1
          fi

          KEY="$RAW_TAURI_SIGNING_PRIVATE_KEY"
          KEY="${KEY//$'\r'/}"

          # Support secret values pasted with literal '\n' sequences.
          if [[ "$KEY" == *"\\n"* ]]; then
            KEY="$(printf '%b' "$KEY")"
          fi

          # Support secret values stored as only the minisign payload line.
          if ! printf '%s' "$KEY" | grep -q '^untrusted comment:'; then
            if printf '%s' "$KEY" | grep -Eq '^RW[0-9A-Za-z+/=]+$'; then
              KEY=$'untrusted comment: minisign encrypted secret key\n'"$KEY"
            fi
          fi

          # Support secret values stored as base64-encoded key file content.
          if ! printf '%s' "$KEY" | grep -q '^untrusted comment:'; then
            DECODED=""
            if DECODED="$(printf '%s' "$KEY" | base64 --decode 2>/dev/null)"; then
              :
            elif DECODED="$(printf '%s' "$KEY" | base64 -D 2>/dev/null)"; then
              :
            fi
            if printf '%s' "$DECODED" | grep -q '^untrusted comment:'; then
              KEY="$DECODED"
            fi
          fi

          if ! printf '%s' "$KEY" | grep -q '^untrusted comment:'; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY format is invalid. Expected minisign private key text with an 'untrusted comment:' header."
            exit 1
          fi

          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<EOF"
            printf '%s\n' "$KEY"
            echo "EOF"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<EOF"
            printf '%s\n' "$RAW_TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Build desktop app + updater bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npm run build
          npx tauri build --bundles app --config '{"bundle":{"createUpdaterArtifacts":true}}'

      - name: Prepare desktop release files
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          mkdir -p builds
          rm -rf "builds/Claude Orchestrator.app"
          cp -R "src-tauri/target/release/bundle/macos/Claude Orchestrator.app" "builds/Claude Orchestrator.app"
          rm -f "builds/Claude Orchestrator.dmg"
          hdiutil create -volname "Claude Orchestrator" -srcfolder "builds/Claude Orchestrator.app" -ov -format UDZO "builds/Claude Orchestrator.dmg"
          mkdir -p release-assets
          ditto -c -k --sequesterRsrc --keepParent "builds/Claude Orchestrator.app" "release-assets/Claude-Orchestrator-${TAG}-macos-app.zip"
          cp "builds/Claude Orchestrator.dmg" "release-assets/Claude-Orchestrator-${TAG}-macos.dmg"
          UPDATER_SOURCE="$(find src-tauri/target/release/bundle -type f -name '*.app.tar.gz' | head -n 1)"
          UPDATER_SIG_SOURCE="$(find src-tauri/target/release/bundle -type f -name '*.app.tar.gz.sig' | head -n 1)"
          if [ -z "$UPDATER_SOURCE" ] || [ -z "$UPDATER_SIG_SOURCE" ]; then
            echo "No updater bundle/signature generated. Ensure signing secrets are configured."
            exit 1
          fi
          UPDATER_FILE="Claude-Orchestrator-${TAG}-macos-updater.tar.gz"
          UPDATER_SIG_FILE="${UPDATER_FILE}.sig"
          cp "$UPDATER_SOURCE" "release-assets/$UPDATER_FILE"
          cp "$UPDATER_SIG_SOURCE" "release-assets/$UPDATER_SIG_FILE"

          ARCH="$(uname -m)"
          if [ "$ARCH" = "arm64" ]; then
            TARGET_ARCH="aarch64"
          else
            TARGET_ARCH="x86_64"
          fi
          TARGET_BASE="darwin-${TARGET_ARCH}"
          RELEASE_URL_BASE="https://github.com/noble1911/claude-orchestrator/releases/download/${TAG}"
          export UPDATER_SIG_CONTENT="$(cat "release-assets/$UPDATER_SIG_FILE")"
          export UPDATER_DOWNLOAD_URL="${RELEASE_URL_BASE}/${UPDATER_FILE}"
          export UPDATE_TARGET="${TARGET_BASE}"
          export UPDATE_VERSION="${TAG#v}"
          export UPDATE_PUB_DATE="${{ env.RELEASE_PUBLISHED_AT }}"
          python3 - <<'PY'
          import json
          import os

          signature = os.environ.get("UPDATER_SIG_CONTENT", "").strip()
          target = os.environ.get("UPDATE_TARGET", "darwin-aarch64").strip()
          update = {
              "version": os.environ.get("UPDATE_VERSION", "0.0.0").strip(),
              "notes": f"Release {os.environ.get('UPDATE_VERSION', '').strip()}",
              "pub_date": os.environ.get("UPDATE_PUB_DATE", "").strip(),
              "platforms": {
                  target: {
                      "url": os.environ["UPDATER_DOWNLOAD_URL"],
                      "signature": signature,
                  },
                  f"{target}-app": {
                      "url": os.environ["UPDATER_DOWNLOAD_URL"],
                      "signature": signature,
                  },
              },
          }
          with open("release-assets/latest.json", "w", encoding="utf-8") as f:
              json.dump(update, f, indent=2)
          PY

      - name: Upload desktop assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            release-assets/Claude-Orchestrator-${{ env.RELEASE_TAG }}-macos-app.zip
            release-assets/Claude-Orchestrator-${{ env.RELEASE_TAG }}-macos.dmg
            release-assets/Claude-Orchestrator-${{ env.RELEASE_TAG }}-macos-updater.tar.gz
            release-assets/Claude-Orchestrator-${{ env.RELEASE_TAG }}-macos-updater.tar.gz.sig
            release-assets/latest.json

  mobile_release:
    name: Build Mobile Release Artifact
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.event.release.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm ci --prefix mobile

      - name: Export mobile bundle
        env:
          EXPO_NO_TELEMETRY: "1"
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          cd mobile
          npx expo export --platform ios --output-dir dist-export/ios
          npx expo export --platform android --output-dir dist-export/android
          tar -czf "../Claude-Orchestrator-${TAG}-mobile-export.tar.gz" dist-export

      - name: Upload mobile asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            Claude-Orchestrator-${{ env.RELEASE_TAG }}-mobile-export.tar.gz
