name: Latest Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  desktop_latest:
    name: Build Desktop Latest Artifacts
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app + dmg
        run: npm run build-dmg

      - name: Package latest desktop artifacts
        run: |
          mkdir -p ci-artifacts
          ditto -c -k --sequesterRsrc --keepParent "builds/Claude Orchestrator.app" "ci-artifacts/Claude-Orchestrator-latest-macos-app.zip"
          cp "builds/Claude Orchestrator.dmg" "ci-artifacts/Claude-Orchestrator-latest-macos.dmg"

      - name: Upload desktop latest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-latest
          path: ci-artifacts/*
          retention-days: 14

  mobile_latest:
    name: Build Mobile Latest Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm ci --prefix mobile

      - name: Export mobile bundle
        env:
          EXPO_NO_TELEMETRY: "1"
        run: |
          cd mobile
          npx expo export --platform ios --output-dir dist-export/ios
          npx expo export --platform android --output-dir dist-export/android
          tar -czf Claude-Orchestrator-latest-mobile-export.tar.gz dist-export

      - name: Upload mobile latest artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-latest
          path: mobile/Claude-Orchestrator-latest-mobile-export.tar.gz
          retention-days: 14
